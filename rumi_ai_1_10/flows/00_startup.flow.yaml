# 公式起動Flow
# flows/00_startup.flow.yaml

flow_id: startup
inputs: {}
outputs:
  initialized: boolean

phases:
  - init
  - security
  - ecosystem
  - finalize

defaults:
  fail_soft: true
  on_missing_step: skip

steps:
  # === init phase ===
  - id: setup_check
    phase: init
    priority: 1
    type: handler
    input:
      handler: "kernel:exec_python"
      args:
        file: "core_runtime/core_pack/core_setup/check_profile.py"

  - id: mounts_init
    phase: init
    priority: 10
    type: handler
    input:
      handler: "kernel:mounts.init"
      args:
        mounts_file: "user_data/mounts.json"

  - id: registry_load
    phase: init
    priority: 20
    type: handler
    input:
      handler: "kernel:registry.load"
      args:
        ecosystem_dir: "ecosystem"

  - id: active_ecosystem_load
    phase: init
    priority: 30
    type: handler
    input:
      handler: "kernel:active_ecosystem.load"
      args:
        config_file: "user_data/active_ecosystem.json"

  # === security phase ===
  - id: security_init
    phase: security
    priority: 10
    type: handler
    input:
      handler: "kernel:security.init"
      args:
        strict_mode: true

  - id: approval_init
    phase: security
    priority: 20
    type: handler
    input:
      handler: "kernel:approval.init"

  - id: approval_scan
    phase: security
    priority: 30
    type: handler
    input:
      handler: "kernel:approval.scan"
      args:
        check_hash: true

  - id: api_init
    phase: security
    priority: 40
    type: handler
    input:
      handler: "kernel:api.init"
      args:
        host: "127.0.0.1"
        port: 8765

  # === ecosystem phase ===
  - id: flow_load_all
    phase: ecosystem
    priority: 10
    type: handler
    input:
      handler: "kernel:flow.load_all"

  # Phase B1-3: kernel function 登録ステップ
  # _KERNEL_HANDLER_MANIFESTS の全エントリを FunctionRegistry に登録する
  - id: kernel_functions_register
    phase: ecosystem
    priority: 15
    type: handler
    input:
      handler: "kernel:register_kernel_functions"

  - id: component_discover
    phase: ecosystem
    priority: 40
    type: handler
    input:
      handler: "kernel:component.discover"
      args:
        approved_only: true

  - id: component_setup
    phase: ecosystem
    priority: 50
    type: handler
    input:
      handler: "component_phase:setup"

  - id: lib_process_all
    phase: ecosystem
    priority: 60
    type: handler
    input:
      handler: "kernel:lib.process_all"
      args:
        packs_dir: "ecosystem"

  - id: pending_export
    phase: ecosystem
    priority: 70
    type: handler
    input:
      handler: "kernel:pending.export"
      args:
        output_dir: "user_data/pending"
    output: pending_export_result

  # === finalize phase ===
  - id: setup_launch_ui
    phase: finalize
    priority: 5
    type: handler
    input:
      handler: "kernel:exec_python"
      args:
        file: "core_runtime/core_pack/core_setup/launch_setup_ui.py"

  - id: interfaces_publish
    phase: finalize
    priority: 10
    type: handler
    input:
      handler: "kernel:interfaces.publish"

  - id: emit_ready
    phase: finalize
    priority: 100
    type: handler
    input:
      handler: "kernel:emit"
      args:
        event: "system.ready"
